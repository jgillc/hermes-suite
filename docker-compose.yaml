# =============================================================================
# Hermes Suite — docker-compose.yaml
#
# Single-container setup: all services in one image.
# No UID/GID sharing issues — everything runs as the same user.
#
# Usage:
#   podman-compose up -d
#   podman-compose logs -f
#   podman-compose down
#
# For Docker, replace podman-compose with docker compose.
# =============================================================================

services:
  hermes-suite:
    build:
      context: .
      dockerfile: Dockerfile
    image: ascensionoid/hermes-suite:${HERMES_SUITE_IMAGE_TAG}
    container_name: hermes-suite
    networks:
      agent_net:
        ipv4_address: 10.99.0.11
    ports:
      # Gateway (CLI, Telegram, webhook)
      - "8642:8642"
      # WebUI (browser chat interface)
      - "8787:8787"
      # Dashboard (monitoring/analytics)
      - "9119:9119"
    volumes:
      # Persist config, sessions, skills, memory across restarts
      - ~/.hermes:/opt/data:Z
      # Persist agent source tree (survives image upgrades)
      - hermes-agent-src:/opt/hermes:Z
      # Workspace directory — change to your project directory
      - ~/workspace:/workspace:z
      # Mount .env_hermes so /reload-config picks up edits at runtime
      - /home/server/.env_hermes:/opt/data/.env:Z
      # Clock sync
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - /home/server/.env_hermes
    environment:
      - NODE_ENV=production
      - HERMES_HOME=/opt/data
      - HERMES_DATA_DIR=/opt/data
      - PATH=/opt/hermes/.venv/bin:/opt/hermes-webui/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      # Remap container user to match host user so file ownership is correct
      - HERMES_UID=${HERMES_UID:-1000}
      - HERMES_GID=${HERMES_GID:-1000}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  playwright:
    image: mcr.microsoft.com/playwright:v1.52.0-noble
    container_name: hermes-playwright
    networks:
      agent_net:
        ipv4_address: 10.99.0.20
    command: ["npx", "playwright", "run-server", "--port", "3000"]
    restart: unless-stopped

volumes:
  # Persists agent source tree (/opt/hermes) across restarts and upgrades.
  # Initialised from the image on first run; survives image pulls/upgrades.
  hermes-agent-src:

networks:
  agent_net:
    external: true
